services:
  openwebui-pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: openwebui-pipelines
    environment:
      - PIPELINES_API_KEY=${OPENWEBUI_PIPELINES_API_KEY}
      - RETRIEVER_API_URL=${RETRIEVER_API_URL}
      - RETRIEVER_TIMEOUT_SEC=${RETRIEVER_TIMEOUT_SEC}
      - RETRIEVER_TOP_K=${RETRIEVER_TOP_K}
      - RETRIEVER_MAX_CONTEXT_CHARS=${RETRIEVER_MAX_CONTEXT_CHARS}
      - RETRIEVER_MAX_CONTEXT_CHUNKS=${RETRIEVER_MAX_CONTEXT_CHUNKS}
    volumes:
      - ./openwebui/pipelines:/app/pipelines
    ports:
      - "${OPENWEBUI_PIPELINES_PORT}:9099"
    depends_on:
      stage7-3-retriever-api:
        condition: service_healthy
    networks:
      - deploy-network
    restart: unless-stopped

  stage7-3-retriever-api:
    build:
      context: ..
      dockerfile: stage7_3_retriever_api/Dockerfile
    container_name: stage7-3-retriever-api
    environment:
      - RETRIEVER_API_HOST=0.0.0.0
      - RETRIEVER_API_PORT=${RETRIEVER_API_PORT}
    ports:
      - "${RETRIEVER_API_PORT}:${RETRIEVER_API_PORT}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${RETRIEVER_API_PORT}/health', timeout=2)\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deploy-network
    restart: unless-stopped

  open-webui:
    build:
      context: ../services/open-webui
    container_name: open-webui
    environment:
      - WEBUI_AUTH=False
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - RETRIEVER_API_URL=${RETRIEVER_API_URL}
      - OPENAI_API_BASE_URLS=http://openwebui-pipelines:9099
      - OPENAI_API_KEYS=${OPENWEBUI_PIPELINES_API_KEY}
    ports:
      - "${OPENWEBUI_PORT}:8080"
    depends_on:
      stage7-3-retriever-api:
        condition: service_healthy
      openwebui-pipelines:
        condition: service_started
    volumes:
      - open_webui_data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deploy-network
    restart: unless-stopped

networks:
  deploy-network:
    driver: bridge

volumes:
  open_webui_data:
